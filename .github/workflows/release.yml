name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  ci-and-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm install

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test --locked

      - name: TypeScript tests
        run: npm test

      - name: Get tag
        id: get-tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        shell: bash
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          if [ -n "$TAG" ]; then
            node scripts/generate-changelog.mjs "$TAG" > /tmp/release-body.md
          else
            echo "Initial release." > /tmp/release-body.md
          fi

      - name: Create release
        if: steps.get-tag.outputs.tag != ''
        shell: bash
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          # Hyphenated tags (v1.2.3-mpv.1, -beta.1, …) become PRERELEASES:
          # GitHub's releases/latest — which the auto-updater endpoints resolve —
          # skips prereleases, so branch/test builds can never reach real users.
          PRERELEASE=false
          if [[ "$TAG" == *-* ]]; then PRERELEASE=true; fi
          gh release create "$TAG" \
            --title "Viboplr $TAG" \
            --notes-file /tmp/release-body.md \
            --draft=false \
            --prerelease=$PRERELEASE \
            || echo "Release already exists"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: ci-and-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Single build per platform. The native engine is compiled into every
      # build and libmpv is bundled from the vendored artifact (fetched below);
      # the per-platform tauri.{macos,windows}.conf.json overlays are auto-merged
      # by the Tauri CLI. There is no separate "Full"/lean flavor.
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      # Bundle libmpv: fetch the pinned, SHA-256-verified vendored artifact for
      # this runner's platform into src-tauri/vendor/libmpv/<platform>/. The
      # tauri.{macos,windows}.conf.json overlays (auto-merged by the CLI) point
      # bundle.macOS.frameworks / bundle.resources at these files.
      - name: Vendor libmpv
        run: node scripts/fetch-libmpv.mjs

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_DMG_IGNORE_CI: 'false'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
          # Baked into the binary at compile time via option_env! (see
          # src-tauri/src/telemetry.rs). Requires the APTABASE_APP_KEY repo secret;
          # without it CI builds bake no key and telemetry is a silent no-op.
          APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
        with:
          tagName: ${{ needs.ci-and-release.outputs.tag }}
          releaseName: 'Viboplr ${{ needs.ci-and-release.outputs.tag }}'
          releaseBody: ''
          releaseDraft: false
          # Keep in sync with the create-release step: hyphenated tags = prerelease.
          prerelease: ${{ contains(needs.ci-and-release.outputs.tag, '-') }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}
