# Self-hosted Aptabase (anonymous usage analytics for the Viboplr desktop app).
#
# Stateful infra brought up once, by hand, on the VPS — it is NOT synced by the
# docs/ GitHub Action (that only rsyncs the marketing site). See README.md.
#
# The `aptabase` service joins the shared `nginx-proxy-manager` network so NPM
# can proxy https://analytics.viboplr.com -> http://aptabase:8080. Postgres and
# ClickHouse stay on the private `internal` network only.
services:
  aptabase:
    # Aptabase publishes no `:latest` — the multi-arch tag is `:main`.
    image: ghcr.io/aptabase/aptabase:main
    container_name: aptabase
    depends_on:
      - db
      - events_db
    environment:
      # Public URL the dashboard is served at (must match the NPM proxy host).
      BASE_URL: ${BASE_URL}
      # Pin the listen port so the NPM proxy target is unambiguous.
      ASPNETCORE_URLS: http://0.0.0.0:8080
      DATABASE_URL: "Server=db;Port=5432;User Id=aptabase;Password=${POSTGRES_PASSWORD};Database=aptabase"
      CLICKHOUSE_URL: "Host=events_db;Protocol=http;Port=8123;Username=aptabase;Password=${CLICKHOUSE_PASSWORD}"
      AUTH_SECRET: ${AUTH_SECRET}
      REGION: SH
      # SMTP is optional for a solo operator: leave unset and Aptabase prints the
      # sign-in magic link to `docker compose logs aptabase` instead of emailing.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
    restart: unless-stopped
    networks:
      - internal
      - nginx-proxy-manager

  db:
    image: postgres:15
    container_name: aptabase-db
    environment:
      POSTGRES_USER: aptabase
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aptabase
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal

  events_db:
    image: clickhouse/clickhouse-server:23.8.4.69
    container_name: aptabase-events
    environment:
      CLICKHOUSE_USER: aptabase
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - chdata:/var/lib/clickhouse
      - chlogs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:
  chdata:
  chlogs:

networks:
  # Private network for app <-> databases.
  internal:
  # Existing Nginx Proxy Manager network (same one the site compose uses); NPM
  # proxies analytics.viboplr.com to http://aptabase:8080.
  nginx-proxy-manager:
    external: true
