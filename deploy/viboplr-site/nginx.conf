server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files; allow extensionless links to resolve to .html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Long cache for static assets
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /404.html {
        internal;
    }
}
