<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="vGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#E91E8A"/>
    </linearGradient>
  </defs>

  <!-- Vinyl grooves -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#vGrad)" stroke-width="6" opacity="0.15"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#vGrad)" stroke-width="4" opacity="0.1"/>

  <!-- The V shape -->
  <path d="M120,110 L256,400 L392,110"
        fill="none"
        stroke="url(#vGrad)"
        stroke-width="56"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Spindle dot -->
  <circle cx="256" cy="400" r="16" fill="url(#vGrad)" opacity="0.6"/>
</svg>
